name: SecureBlog CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests PHP
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: secureblog_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: pdo_mysql, mbstring, bcmath, zip

      - name: Installer les dépendances PHP
        run: composer install --no-interaction --prefer-dist

      - name: Copier le .env de test
        run: cp .env.example .env.testing

      - name: Configurer la BDD de test
        run: |
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=secureblog_test" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=secret" >> .env.testing

      - name: Générer la clé applicative
        run: php artisan key:generate --env=testing

      - name: Lancer les migrations de test
        run: php artisan migrate --env=testing --force

      - name: Lancer les 25 tests
        run: php artisan test --env=testing

  security:
    name: Scan de sécurité
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - name: Installer les dépendances
        run: composer install --no-interaction

      - name: Audit des dépendances PHP
        run: composer audit

      - name: Installer Trivy
        run: |
          wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scanner les vulnérabilités
        run: trivy fs . --severity HIGH,CRITICAL --exit-code 1
