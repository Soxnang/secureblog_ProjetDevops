name: SecureBlog CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests PHP
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: secureblog_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: pdo_mysql, mbstring, bcmath, zip

      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Installer les dépendances PHP
        run: composer install --no-interaction --prefer-dist

      - name: Installer et compiler les assets
        run: |
          npm install
          npm run build

      - name: Configurer l'environnement de test
        run: |
          cp .env.example .env
          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=secureblog_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=secret" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "MAIL_MAILER=array" >> .env

      - name: Générer la clé applicative
        run: php artisan key:generate

      - name: Lancer les migrations de test
        run: php artisan migrate --force

      - name: Lancer les 25 tests
        run: php artisan test

  security:
    name: Scan de sécurité
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - name: Installer les dépendances
        run: composer install --no-interaction

      - name: Audit des dépendances PHP
        run: composer audit

      - name: Installer Trivy
        run: |
          wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scanner les vulnérabilités
        run: trivy fs . --severity HIGH,CRITICAL --exit-code 1 
